<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semester project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Registration Form</h1>
            <p>Fill the form to register</p>
        </div>
        <form id="registrationForm">
            <label for="Fullname">Enter your full Name:</label>
            <input type="text" id="Fullname" placeholder="Input your Name">

            <label for="Email">Enter your email:</label>
            <input type="text" id="Email" placeholder="Input your Email">

            <label for="Age">Enter your Age:</label>
            <input type="number" id="Age" placeholder="Input your Age">

            <div class="fieldOfStudy">
                <label for="field_of_study">Choose a field:</label>
                <select id="field_of_study" name="field_of_study">
                    <option value="Computer Science">Computer Science</option>
                    <option value="Game Development">Game Design</option>
                    <option value="Marketing">Programming</option>
                </select>
            </div>
            
            <div class="terms">
                <label for="terms">I agree to the terms and conditions</label>
                <input type="checkbox" id="terms">
            </div>

            <button type="submit">Register</button>
        </form>

        <div class="message" >
            <label id="message"></label>
        </div>
    
    </div>
    <div class="container">
        <div list="list">
            <h2>Registered Users</h2>
            <ul id="userList"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
